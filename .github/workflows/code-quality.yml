name: Code Quality

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the project
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        id: typecheck
        run: npm run typecheck
        continue-on-error: true

      - name: Biome lint and format check
        id: biome
        run: npm run check
        continue-on-error: true

      - name: Run unit tests
        id: tests
        run: npm run test
        continue-on-error: true

      - name: Security audit
        id: audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Summary
        if: always()
        run: |
          echo "TypeScript: ${{ steps.typecheck.outcome }}"
          echo "Biome: ${{ steps.biome.outcome }}"
          echo "Tests: ${{ steps.tests.outcome }}"
          echo "Security Audit: ${{ steps.audit.outcome }}"
          if [ "${{ steps.typecheck.outcome }}" == "failure" ] || \
             [ "${{ steps.biome.outcome }}" == "failure" ] || \
             [ "${{ steps.tests.outcome }}" == "failure" ]; then
            exit 1
          fi

      - name: Comment on PR
        if: always() && github.event_name == 'pull_request'
        uses: thollander/actions-comment-pull-request@v3
        with:
          message: |
            ### Code Quality Summary

            | TypeScript | Biome | Tests | Security Audit |
            |:----------:|:-----:|:-----:|:--------------:|
            | ${{ steps.typecheck.outcome == 'success' && '✅ Passed' || '❌ Failed' }} | ${{ steps.biome.outcome == 'success' && '✅ Passed' || '❌ Failed' }} | ${{ steps.tests.outcome == 'success' && '✅ Passed' || '❌ Failed' }} | ${{ steps.audit.outcome == 'success' && '✅ Passed' || '❌ Failed' }} |
          comment-tag: code-quality-summary
