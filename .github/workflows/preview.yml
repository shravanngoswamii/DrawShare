name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  build-and-preview:
    if: github.event.action == 'opened' || github.event.action == 'synchronize' || github.event.action == 'reopened'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build for preview
        env:
          BASE_PATH: /${{ github.event.repository.name }}/pr-previews/${{ github.event.pull_request.number }}/
        run: npm run build

      - name: Add SPA fallback
        run: cp dist/index.html dist/404.html

      - name: Disable Jekyll
        run: touch dist/.nojekyll

      - name: Deploy preview to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
          target-folder: pr-previews/${{ github.event.pull_request.number }}
          clean: true
          clean-exclude: |
            pr-previews
          commit-message: "Deploy preview for PR #${{ github.event.pull_request.number }}"

      - name: Comment with preview URL
        uses: thollander/actions-comment-pull-request@v3
        with:
          message: |
            <!-- preview-url-comment -->
            Preview deployed for this pull request.

            **<https://shravangoswami.com/${{ github.event.repository.name }}/pr-previews/${{ github.event.pull_request.number }}/>**

            Latest commit: `${{ github.event.pull_request.head.sha }}`
          comment-tag: preview-url-comment

  cleanup-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Remove PR preview
        run: |
          if [ -d "pr-previews/${{ github.event.pull_request.number }}" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git rm -rf "pr-previews/${{ github.event.pull_request.number }}"
            git commit -m "Remove preview for PR #${{ github.event.pull_request.number }}"
            git push
          else
            echo "Preview directory not found, skipping."
          fi
