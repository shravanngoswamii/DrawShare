name: Bug report
description: Something is broken or behaves unexpectedly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out as much as you can — the more detail you provide, the faster it can be fixed.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "When I do X, Y happens instead of Z."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact steps to reproduce the problem.
      placeholder: |
        1. Open a new project
        2. Select the pen tool
        3. Draw a stroke
        4. …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What should have happened?
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device
      placeholder: "iPad Pro 12.9" / MacBook Pro M3 / Windows PC"
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser and version
      placeholder: "Safari 17.4 / Chrome 124 / Firefox 126"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS and version
      placeholder: "iPadOS 17.4 / macOS 14.4 / Windows 11"
    validations:
      required: true

  - type: textarea
    id: console
    attributes:
      label: Console errors (if any)
      description: Paste any errors from the browser console.
      render: shell

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Screenshots, screen recordings, or additional context.
