<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="DrawShare" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="color-scheme" content="light dark" />
    <meta name="supported-color-schemes" content="light dark" />
    <link rel="manifest" href="/DrawShare/pr-previews/76/manifest.webmanifest" />
    <!-- Landing-page display + mono faces (swap = no invisible text while loading) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap"
    />
    <title>DrawShare</title>
    <!-- Prevent flash of wrong theme: apply data-theme before CSS renders -->
    <script>
      (() => {
        var t;
        try {
          t = localStorage.getItem("drawshare-theme");
          if (t === "dark" || (t !== "light" && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
            document.documentElement.setAttribute("data-theme", "dark");
          } else if (t === "light") {
            document.documentElement.setAttribute("data-theme", "light");
          }
        } catch (e) {}
      })();
    </script>
    <script type="module" crossorigin src="/DrawShare/pr-previews/76/assets/index-tnsbsg3T.js"></script>
    <link rel="stylesheet" crossorigin href="/DrawShare/pr-previews/76/assets/style-D-5u7CPX.css">
  </head>

    <div id="app"></div>
  </body>
</html>
